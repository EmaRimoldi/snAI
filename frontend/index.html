<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in - RealDoor</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpath d='M2.5 15.5 V7 A5.5 5.5 0 0 1 13.5 7 V15.5 Z' fill='%237c2d12'/%3E%3Cpath d='M5 15.5 V7.3 A3 3 0 0 1 11 7.3 V15.5 Z' fill='%23b45309'/%3E%3Ccircle cx='9.7' cy='11.2' r='0.9' fill='%23fff7ed'/%3E%3Crect x='1.2' y='14.6' width='13.6' height='1.4' rx='0.7' fill='%237c2d12'/%3E%3C/svg%3E">
<style>
  :root {
    color-scheme: light;
    --brand: #7c2d12;
    --brand-dark: #66240e;
    --door: #b45309;
    --ink: #111827;
    --muted: #4b5563;
    --danger: #b91c1c;
    --line: #e5e7eb;
    --cream: #fff7ed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #ffffff;
    color: var(--ink);
    font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  .visually-hidden {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }
  a.skip-link {
    position: absolute; left: -9999px; top: 0; z-index: 10;
    background: #ffffff; color: var(--brand); padding: 0.5rem 1rem;
  }
  a.skip-link:focus { left: 0; }
  header {
    position: relative;
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.5rem 1rem; padding: 0.875rem 1.5rem; border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 0.625rem; }
  .brand svg { display: block; }
  h1 { font-size: 1.25rem; margin: 0; letter-spacing: -0.01em; }
  h1 .accent { color: var(--brand); }
  main { max-width: 24rem; margin: 0 auto; padding: 2rem 1.5rem; }
  h2 { font-size: 1.5rem; margin: 0 0 0.25rem; }
  .tagline { margin: 0 0 1.5rem; color: var(--muted); font-size: 0.9375rem; }
  form { display: grid; gap: 1rem; }
  label { font-weight: 600; display: block; margin-bottom: 0.25rem; }
  input {
    width: 100%; padding: 0.625rem 0.75rem; font: inherit;
    color: var(--ink); background: #ffffff;
    border: 1px solid #6b7280; border-radius: 0.375rem;
  }
  input[aria-invalid="true"] { border: 2px solid var(--danger); }
  button {
    font: inherit; font-weight: 600; cursor: pointer;
    padding: 0.625rem 1rem; min-height: 44px;
    border-radius: 0.375rem; border: 1px solid transparent;
    background: var(--brand); color: #ffffff;
  }
  button:hover { background: var(--brand-dark); }
  button.secondary { background: #ffffff; color: var(--brand); border-color: var(--brand); }
  button.secondary:hover { background: var(--cream); }
  :focus-visible { outline: 3px solid var(--brand); outline-offset: 2px; }
  .icon-button {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; min-height: 44px; padding: 0;
    background: #ffffff; color: var(--ink);
    border: 1px solid var(--line); border-radius: 50%;
  }
  .icon-button:hover { background: var(--cream); border-color: var(--door); }
  .account-panel {
    position: absolute; right: 1.5rem; top: calc(100% + 0.5rem); z-index: 5;
    min-width: 14rem; padding: 0.75rem; display: grid; gap: 0.75rem;
    background: #ffffff; border: 1px solid var(--line); border-radius: 0.5rem;
    box-shadow: 0 8px 24px rgba(17, 24, 39, 0.12);
  }
  .account-panel p { margin: 0; color: var(--muted); font-size: 0.9375rem; overflow-wrap: anywhere; }
  .error { color: var(--danger); font-weight: 600; margin: 0; }
  .field-error { color: var(--danger); margin: 0.25rem 0 0; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to main content</a>
<header>
  <div class="brand">
    <svg width="30" height="30" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M4.5 21 V10 A7.5 7.5 0 0 1 19.5 10 V21 Z" fill="#7c2d12"/>
      <path d="M7 21 V10.4 A5 5 0 0 1 17 10.4 V21 Z" fill="#b45309"/>
      <circle cx="14.9" cy="14.4" r="1" fill="#fff7ed"/>
      <rect x="3" y="20.4" width="18" height="1.8" rx="0.9" fill="#7c2d12"/>
    </svg>
    <h1>Real<span class="accent">Door</span></h1>
  </div>
  <button id="account-button" class="icon-button" type="button"
          aria-expanded="false" aria-controls="account-panel" hidden>
    <span class="visually-hidden">Account</span>
    <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <circle cx="12" cy="8" r="4" fill="currentColor"/>
      <path d="M4 20.5 a8 8 0 0 1 16 0 Z" fill="currentColor"/>
    </svg>
  </button>
  <div id="account-panel" class="account-panel" hidden>
    <p id="account-email"></p>
    <button id="signout" class="secondary" type="button">Sign out</button>
  </div>
</header>
<main id="main">
  <section id="view-login" aria-labelledby="login-heading" hidden>
    <h2 id="login-heading" tabindex="-1">Sign in</h2>
    <p class="tagline">Application-Readiness Copilot</p>
    <form id="login-form" novalidate>
      <p id="form-error" class="error" role="alert" hidden></p>
      <div>
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email"
               required aria-describedby="email-error" autocapitalize="none" spellcheck="false">
        <p id="email-error" class="field-error" hidden></p>
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password"
               autocomplete="current-password" required aria-describedby="password-error">
        <p id="password-error" class="field-error" hidden></p>
      </div>
      <button type="submit" id="submit">Sign in</button>
    </form>
  </section>
  <section id="view-app" aria-labelledby="app-heading" hidden>
    <h2 id="app-heading" tabindex="-1" class="visually-hidden">Home</h2>
    <!-- App content intentionally empty for now -->
  </section>
  <p id="status" role="status" aria-live="polite" class="visually-hidden"></p>
</main>
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // Publishable key: safe to expose by design (like an anon key).
  const SUPABASE_URL = "https://zgfanoruqwftbqhhvtwg.supabase.co";
  const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_ThFBIsq2HyTAGwuWgdVuNw_bvfUh6Vy";

  const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

  const el = (id) => document.getElementById(id);
  const viewLogin = el("view-login");
  const viewApp = el("view-app");
  const form = el("login-form");
  const emailInput = el("email");
  const passwordInput = el("password");
  const formError = el("form-error");
  const emailError = el("email-error");
  const passwordError = el("password-error");
  const statusEl = el("status");
  const accountBtn = el("account-button");
  const accountPanel = el("account-panel");
  const accountEmail = el("account-email");
  const signoutBtn = el("signout");

  let busy = false;

  // Screen-reader-only completion announcements (no visible status text).
  function announce(message) { statusEl.textContent = message; }

  function closeAccountPanel() {
    accountPanel.hidden = true;
    accountBtn.setAttribute("aria-expanded", "false");
  }

  function showLogin() {
    viewApp.hidden = true;
    viewLogin.hidden = false;
    accountBtn.hidden = true;
    closeAccountPanel();
    document.title = "Sign in - RealDoor";
  }

  function showApp(session) {
    viewLogin.hidden = true;
    viewApp.hidden = false;
    accountEmail.textContent = session.user.email;
    accountBtn.hidden = false;
    document.title = "Home - RealDoor";
  }

  function clearErrors() {
    formError.hidden = true; formError.textContent = "";
    emailError.hidden = true; emailError.textContent = "";
    passwordError.hidden = true; passwordError.textContent = "";
    emailInput.removeAttribute("aria-invalid");
    passwordInput.removeAttribute("aria-invalid");
  }

  accountBtn.addEventListener("click", () => {
    const isOpen = !accountPanel.hidden;
    if (isOpen) {
      closeAccountPanel();
    } else {
      accountPanel.hidden = false;
      accountBtn.setAttribute("aria-expanded", "true");
    }
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && !accountPanel.hidden) {
      closeAccountPanel();
      accountBtn.focus();
    }
  });

  document.addEventListener("click", (event) => {
    if (accountPanel.hidden) return;
    if (!accountPanel.contains(event.target) && !accountBtn.contains(event.target)) {
      closeAccountPanel();
    }
  });

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    if (busy) return;
    clearErrors();

    let firstInvalid = null;
    if (!emailInput.value.trim()) {
      emailError.textContent = "Error: Enter your email address.";
      emailError.hidden = false;
      emailInput.setAttribute("aria-invalid", "true");
      firstInvalid = emailInput;
    }
    if (!passwordInput.value) {
      passwordError.textContent = "Error: Enter your password.";
      passwordError.hidden = false;
      passwordInput.setAttribute("aria-invalid", "true");
      firstInvalid = firstInvalid || passwordInput;
    }
    if (firstInvalid) {
      announce("");
      firstInvalid.focus();
      return;
    }

    busy = true;
    announce("Signing in, please wait.");
    const { data, error } = await supabase.auth.signInWithPassword({
      email: emailInput.value.trim(),
      password: passwordInput.value,
    });
    busy = false;

    if (error) {
      announce("");
      const friendly = error.message === "Invalid login credentials"
        ? "Incorrect email or password."
        : error.message;
      formError.textContent = "Error: " + friendly;
      formError.hidden = false;
      emailInput.focus();
      return;
    }

    showApp(data.session);
    announce("Signed in successfully.");
    el("app-heading").focus();
  });

  signoutBtn.addEventListener("click", async () => {
    await supabase.auth.signOut();
    showLogin();
    announce("Signed out.");
    el("login-heading").focus();
  });

  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    showApp(session);
  } else {
    showLogin();
  }
</script>
</body>
</html>
